<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lista de Compras</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav>
    <a href="index.html">Dashboard</a>
    <a href="cadastro.html">Produtos</a>
    <a href="lista.html" class="active">Lista de Compras</a>
    <a href="cupom.html">🧾 Cupom</a>
  </nav>

  <div class="card">

    <div class="page-header">
      <h1>Lista de <span>Compras</span></h1>
      <p>Selecione produtos ou adicione um item avulso à sua lista.</p>
    </div>

    <!-- Buscar produto cadastrado -->
    <p class="section-title">Adicionar do catálogo</p>

    <div class="search-wrapper">
      <span class="icon">🔍</span>
      <input type="text" id="busca" placeholder="Buscar produto cadastrado..." />
    </div>

    <div id="resultadoBusca"></div>

    <div class="divider"></div>

    <!-- Adicionar item avulso -->
    <p class="section-title">Adicionar item avulso</p>

    <div class="input-row">
      <div class="input-group" style="margin-bottom:0">
        <label for="nomeAvulso">Nome</label>
        <input type="text" id="nomeAvulso" placeholder="Ex: Pão francês" />
      </div>
      <div class="input-group" style="margin-bottom:0">
        <label for="valorAvulso">Preço (R$)</label>
        <input type="text" id="valorAvulso" placeholder="R$ 0,00" inputmode="numeric" />
      </div>
    </div>

    <div class="input-group" style="margin-top:1rem">
      <label for="qtdAvulso">Quantidade</label>
      <input type="number" id="qtdAvulso" value="1" min="1" />
    </div>

    <button class="btn" id="btnAvulso">+ Adicionar à lista</button>

    <div class="divider"></div>

    <!-- Lista atual -->
    <p class="section-title">Minha lista</p>

    <div id="listaItens">
      <p class="empty">Sua lista está vazia.</p>
    </div>

    <!-- Total -->
    <div class="total-card" id="totalCard" style="display:none">
      <div>
        <div class="label">Total da compra</div>
        <div class="qtd-itens" id="qtdItens"></div>
      </div>
      <div class="valor-total" id="valorTotal">R$ 0,00</div>
    </div>

  </div>

  <div class="toast" id="toast"></div>

  <script src="lista.js"></script>
</body>
</html>
